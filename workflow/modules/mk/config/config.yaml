# snpArcher v2 — MK Module standalone config
# Used when running the module independently (not from the main workflow).

samples: "config/samples.csv"        # path to sample sheet CSV (sample_id column required)
sample_metadata: ""                  # path to metadata CSV (outgroup/exclude columns)
vcf: "results/postprocess/filtered.vcf.gz"  # path to filtered VCF
ref: "results/reference/ref.fa.gz"   # path to reference FASTA (may be bgzipped)
gff: ""                              # path to GFF annotation file (REQUIRED)
