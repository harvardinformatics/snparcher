$schema: "https://json-schema.org/draft/2020-12/schema"
description: snpArcher configuration schema
type: object
additionalProperties: false

properties:
  samples:
    type: string
    description: Path to samples CSV file
    default: "config/samples.csv"

  reference:
    type: object
    additionalProperties: false
    properties:
      name:
        type: string
        description: Reference genome name (used for output filenames)
      source:
        type: string
        description: Path, URL, or NCBI accession for reference genome
    required:
      - name
      - source

  variant_calling:
    type: object
    additionalProperties: false
    default: {}
    properties:
      expected_coverage:
        type: string
        enum: ["low", "high"]
        default: "low"
      tool:
        type: string
        enum: ["gatk", "sentieon"]
        default: "gatk"
      ploidy:
        type: integer
        minimum: 1
        default: 2
      gatk:
        type: object
        additionalProperties: false
        default: {}
        properties:
          het_prior:
            type: number
            minimum: 0
            maximum: 1
            default: 0.005
      sentieon:
        type: object
        additionalProperties: false
        default: {}
        properties:
          license:
            type: string
            default: ""

  intervals:
    type: object
    additionalProperties: false
    default: {}
    properties:
      enabled:
        type: boolean
        default: true
      min_nmer:
        type: integer
        minimum: 1
        default: 500
      num_gvcf_intervals:
        type: integer
        minimum: 1
        default: 50
      db_scatter_factor:
        type: number
        minimum: 0
        default: 0.15

  callable_sites:
    type: object
    additionalProperties: false
    default: {}
    properties:
      generate_bed_file:
        type: boolean
        default: true
      coverage:
        type: object
        additionalProperties: false
        default: {}
        properties:
          enabled:
            type: boolean
            default: true
          stdev:
            type: number
            minimum: 0
            default: 2
          merge_distance:
            type: integer
            minimum: 0
            default: 100
      mappability:
        type: object
        additionalProperties: false
        default: {}
        properties:
          enabled:
            type: boolean
            default: true
          kmer:
            type: integer
            minimum: 1
            default: 150
          min_score:
            type: number
            minimum: 0
            maximum: 1
            default: 1
          merge_distance:
            type: integer
            minimum: 0
            default: 100

  modules:
    type: object
    additionalProperties: false
    default: {}
    properties:
      qc:
        type: object
        additionalProperties: false
        default: {}
        properties:
          enabled:
            type: boolean
            default: false
          clusters:
            type: integer
            minimum: 1
            default: 3
          min_depth:
            type: number
            minimum: 0
            default: 2
          google_api_key:
            type: string
            default: ""
      postprocess:
        type: object
        additionalProperties: false
        default: {}
        properties:
          enabled:
            type: boolean
            default: false
          filtering:
            type: object
            additionalProperties: false
            default: {}
            properties:
              contig_size:
                type: integer
                minimum: 0
                default: 10000
              maf:
                type: number
                minimum: 0
                maximum: 1
                default: 0.01
              missingness:
                type: number
                minimum: 0
                maximum: 1
                default: 0.75
              exclude_scaffolds:
                type: string
                default: "mtDNA,Y"
      trackhub:
        type: object
        additionalProperties: false
        default: {}
        properties:
          enabled:
            type: boolean
            default: false
          email:
            type: string
            default: "example@email.com"

required:
  - samples
  - reference
