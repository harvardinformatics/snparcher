samples: "samples.csv"

reference:
  name: "test_genome"
  path: "tests/data/reference/test_genome.fa.gz"

reads:
  mark_duplicates: true
  sort: false

variant_calling:
  expected_coverage: "low"
  tool: "gatk"
  gatk:
    ploidy: 2
    min_pruning: 1
    min_dangling: 1
    het_prior: 0.005
    concat_batch_size: 5
    concat_max_rounds: 20

remote_reads:
  enabled: false

intervals:
  enabled: true
  min_nmer: 500
  num_gvcf_intervals: 50
  db_scatter_factor: 0.15

callable_sites:
  generate_bed_file: false
  coverage:
    enabled: true
    stdev: 2
    merge_distance: 100
  mappability:
    enabled: true
    min_score: 1
    kmer: 150
    merge_distance: 100

modules:
  qc:
    enabled: false
    clusters: 3
    min_depth: 2
    google_api_key: ""
  postprocess:
    enabled: false
    filtering:
      contig_size: 10000
      maf: 0.01
      missingness: 0.75
      exclude_scaffolds: "mtDNA,Y"
  trackhub:
    enabled: false
    email: "example@email.com"
