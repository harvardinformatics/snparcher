samples: "samples.csv"

reference:
  name: "Test_Ref"
  source: "tests/data/reference/Test_Ref.fa" # Can be a refseq/genbank accession, url, or path

variant_calling:
  expected_coverage: "low" # low | high | auto (future)
  tool: "gatk"
  ploidy: 2
  gatk:
    het_prior: 0.005
    concat_batch_size: 5
    concat_max_rounds: 20
  sentieon:
    license: ""
  bcftools:
    min_mapq: 20
    min_baseq: 20
    max_depth: 250
  deepvariant:
    model_type: "WGS"
    num_shards: 8
  parabricks:
    container_image: "/tmp/parabricks.sif"
    num_gpus: 1
    num_cpu_threads: 4
    extra_args: ""

intervals:
  enabled: true
  min_nmer: 500
  num_gvcf_intervals: 50
  db_scatter_factor: 0.15

callable_sites:
  generate_bed_file: true
  coverage:
    enabled: true
    fraction: 1.0
    min_coverage: auto
    max_coverage: auto
    merge_distance: 100
  mappability:
    enabled: true
    min_score: 1
    kmer: 150
    merge_distance: 100

modules:
  qc:
    enabled: true
    clusters: 3
    min_depth: 2
    google_api_key: ""
    exclude_scaffolds: ""
  postprocess:
    enabled: false
    filtering:
      contig_size: 10000
      maf: 0.01
      missingness: 0.75
      exclude_scaffolds: "mtDNA,Y"
