name: Tests

on:
  push:
    branches:
      - main
    paths:
      - "**/Snakefile"
      - "**/*.smk"
      - "**/*.py"
      - "workflow/**/*.yml"
      - "workflow/**/*.yaml"
      - "pyproject.toml"
      - ".github/workflows/*"
  pull_request:
    paths:
      - "**/Snakefile"
      - "**/*.smk"
      - "**/*.py"
      - "workflow/**/*.yml"
      - "workflow/**/*.yaml"
      - "pyproject.toml"
      - ".github/workflows/*"

jobs:
  dry-run-tests:
    name: dry-run (${{ matrix.group }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - group: core
            filter: "not metadata and not postprocess and not qc"
          - group: metadata
            filter: "metadata and not postprocess and not qc"
          - group: postprocess
            filter: "postprocess"
          - group: qc
            filter: "qc"
    steps:
      - uses: actions/checkout@v4

      - uses: prefix-dev/setup-pixi@v0.9.3
        with:
          cache: true
          environments: dev

      - name: Run dry-run tests
        run: pixi run -e dev pytest -v tests/tests.py --dry-run-only -k "${{ matrix.filter }}"

  build-conda-envs:
    name: build conda envs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: prefix-dev/setup-pixi@v0.9.3
        with:
          cache: true
          environments: dev

      - name: Cache conda envs
        id: conda-cache
        uses: actions/cache@v4
        with:
          path: .snakemake/conda
          key: conda-envs-${{ hashFiles('workflow/**/*.yml', 'workflow/**/*.yaml', 'pyproject.toml') }}

      - name: Create conda envs
        if: steps.conda-cache.outputs.cache-hit != 'true'
        run: pixi run -e dev setup-test-envs

  unit-tests:
    name: unit (${{ matrix.group }})
    needs: build-conda-envs
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        group: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v4

      - uses: prefix-dev/setup-pixi@v0.9.3
        with:
          cache: true
          environments: dev

      - name: Restore conda envs
        uses: actions/cache/restore@v4
        with:
          path: .snakemake/conda
          key: conda-envs-${{ hashFiles('workflow/**/*.yml', 'workflow/**/*.yaml', 'pyproject.toml') }}
          fail-on-cache-miss: true

      - name: Run unit tests
        env:
          TMPDIR: ${{ runner.temp }}
        run: |
          pixi run -e dev pytest -v tests/unit_tests.py \
            --conda-prefix $(pwd)/.snakemake/conda \
            --splits 4 --group ${{ matrix.group }}

  full-run-tests:
    name: full-run (${{ matrix.group }})
    needs: build-conda-envs
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - group: core-1
            filter: "not metadata and not postprocess and not qc"
            split_group: 1
          - group: core-2
            filter: "not metadata and not postprocess and not qc"
            split_group: 2
          - group: core-3
            filter: "not metadata and not postprocess and not qc"
            split_group: 3
          - group: qc
            filter: "qc"
            split_group: 0
    steps:
      - uses: actions/checkout@v4

      - uses: prefix-dev/setup-pixi@v0.9.3
        with:
          cache: true
          environments: dev

      - name: Restore conda envs
        uses: actions/cache/restore@v4
        with:
          path: .snakemake/conda
          key: conda-envs-${{ hashFiles('workflow/**/*.yml', 'workflow/**/*.yaml', 'pyproject.toml') }}
          fail-on-cache-miss: true

      - name: Run full tests
        env:
          TMPDIR: ${{ runner.temp }}
        run: |
          SPLIT_ARGS=""
          if [ "${{ matrix.split_group }}" != "0" ]; then
            SPLIT_ARGS="--splits 3 --group ${{ matrix.split_group }}"
          fi
          pixi run -e dev pytest -v tests/tests.py \
            --conda-prefix $(pwd)/.snakemake/conda \
            -m full_run \
            -k "${{ matrix.filter }}" \
            $SPLIT_ARGS

      - name: Upload QC dashboard
        if: matrix.group == 'qc'
        uses: actions/upload-artifact@v4
        with:
          name: qc-dashboard
          path: test-artifacts/
          retention-days: 5
          if-no-files-found: ignore
